<!-- Header -->
<header class="header">
  <button class="menu-btn" (click)="toggleSidebar()">☰</button>
  <h1>FinanceFlow</h1>
  <div class="avatar">U</div>
</header>
@for (item of navItems; track item.path) {
  <a
    [routerLink]="item.path"
    routerLinkActive="active"
    class="nav-item"
  >
    {{ item.label }}
  </a>
}


<!-- Conteúdo -->
<main [class.sidebar-open]="sidebarOpen">
  <router-outlet />
</main>
